<?xml version="1.0" encoding="UTF-8"?>
<!--
  RFC Fishing App  Westcott-style 20-inch reference ruler (portable SVG).
  Physical size: 20in x 0.65in when printed or embedded at native scale.
  viewBox units: 100 = 1 inch along the horizontal axis.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="20in"
     height="0.65in"
     viewBox="0 0 2000 65"
     preserveAspectRatio="none"
     role="img"
     aria-label="Westcott 20 inch reference ruler, 0 through 20 inches">
  <defs>
    <linearGradient id="rfcWood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dcc99a"/>
      <stop offset="45%" stop-color="#c4a574"/>
      <stop offset="100%" stop-color="#9a7848"/>
    </linearGradient>
    <linearGradient id="rfcEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6b5438" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#6b5438" stop-opacity="0"/>
      <stop offset="100%" stop-color="#6b5438" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- Ruler body -->
  <rect x="0" y="0" width="2000" height="65" fill="url(#rfcWood)" stroke="#4a3824" stroke-width="2"/>
  <rect x="0" y="0" width="2000" height="65" fill="url(#rfcEdge)" stroke="none"/>

  <!-- Metal edge strip (Westcott-style) -->
  <rect x="0" y="0" width="2000" height="8" fill="#8a9098" opacity="0.55"/>
  <line x1="0" y1="8" x2="2000" y2="8" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Quarter-inch ticks: 0..80 (25 viewBox units = 0.25 in) -->
  <g stroke="#141414" stroke-linecap="square" fill="#141414">
    <!-- Major inch ticks and numbers -->
    <g font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" text-anchor="middle">
      <g id="inch-marks">
        <!-- Generated inch lines at x = 0, 100, 200, ... 2000 -->
        <line x1="0" y1="12" x2="0" y2="58" stroke-width="2"/>
        <text x="0" y="52" font-size="20">0</text>
        <line x1="100" y1="12" x2="100" y2="58" stroke-width="2"/>
        <text x="100" y="52">1</text>
        <line x1="200" y1="12" x2="200" y2="58" stroke-width="2"/>
        <text x="200" y="52">2</text>
        <line x1="300" y1="12" x2="300" y2="58" stroke-width="2"/>
        <text x="300" y="52">3</text>
        <line x1="400" y1="12" x2="400" y2="58" stroke-width="2"/>
        <text x="400" y="52">4</text>
        <line x1="500" y1="12" x2="500" y2="58" stroke-width="2"/>
        <text x="500" y="52">5</text>
        <line x1="600" y1="12" x2="600" y2="58" stroke-width="2"/>
        <text x="600" y="52">6</text>
        <line x1="700" y1="12" x2="700" y2="58" stroke-width="2"/>
        <text x="700" y="52">7</text>
        <line x1="800" y1="12" x2="800" y2="58" stroke-width="2"/>
        <text x="800" y="52">8</text>
        <line x1="900" y1="12" x2="900" y2="58" stroke-width="2"/>
        <text x="900" y="52">9</text>
        <line x1="1000" y1="12" x2="1000" y2="58" stroke-width="2"/>
        <text x="1000" y="52">10</text>
        <line x1="1100" y1="12" x2="1100" y2="58" stroke-width="2"/>
        <text x="1100" y="52">11</text>
        <line x1="1200" y1="12" x2="1200" y2="58" stroke-width="2"/>
        <text x="1200" y="52">12</text>
        <line x1="1300" y1="12" x2="1300" y2="58" stroke-width="2"/>
        <text x="1300" y="52">13</text>
        <line x1="1400" y1="12" x2="1400" y2="58" stroke-width="2"/>
        <text x="1400" y="52">14</text>
        <line x1="1500" y1="12" x2="1500" y2="58" stroke-width="2"/>
        <text x="1500" y="52">15</text>
        <line x1="1600" y1="12" x2="1600" y2="58" stroke-width="2"/>
        <text x="1600" y="52">16</text>
        <line x1="1700" y1="12" x2="1700" y2="58" stroke-width="2"/>
        <text x="1700" y="52">17</text>
        <line x1="1800" y1="12" x2="1800" y2="58" stroke-width="2"/>
        <text x="1800" y="52">18</text>
        <line x1="1900" y1="12" x2="1900" y2="58" stroke-width="2"/>
        <text x="1900" y="52">19</text>
        <line x1="2000" y1="12" x2="2000" y2="58" stroke-width="2"/>
        <text x="2000" y="52">20</text>
      </g>
    </g>

    <!-- Half-inch ticks -->
    <g stroke-width="1.5">
      <line x1="50" y1="18" x2="50" y2="58"/>
      <line x1="150" y1="18" x2="150" y2="58"/>
      <line x1="250" y1="18" x2="250" y2="58"/>
      <line x1="350" y1="18" x2="350" y2="58"/>
      <line x1="450" y1="18" x2="450" y2="58"/>
      <line x1="550" y1="18" x2="550" y2="58"/>
      <line x1="650" y1="18" x2="650" y2="58"/>
      <line x1="750" y1="18" x2="750" y2="58"/>
      <line x1="850" y1="18" x2="850" y2="58"/>
      <line x1="950" y1="18" x2="950" y2="58"/>
      <line x1="1050" y1="18" x2="1050" y2="58"/>
      <line x1="1150" y1="18" x2="1150" y2="58"/>
      <line x1="1250" y1="18" x2="1250" y2="58"/>
      <line x1="1350" y1="18" x2="1350" y2="58"/>
      <line x1="1450" y1="18" x2="1450" y2="58"/>
      <line x1="1550" y1="18" x2="1550" y2="58"/>
      <line x1="1650" y1="18" x2="1650" y2="58"/>
      <line x1="1750" y1="18" x2="1750" y2="58"/>
      <line x1="1850" y1="18" x2="1850" y2="58"/>
      <line x1="1950" y1="18" x2="1950" y2="58"/>
    </g>

    <!-- Quarter-inch ticks -->
    <g stroke-width="1" opacity="0.85">
      <line x1="25" y1="28" x2="25" y2="58"/>
      <line x1="75" y1="28" x2="75" y2="58"/>
      <line x1="125" y1="28" x2="125" y2="58"/>
      <line x1="175" y1="28" x2="175" y2="58"/>
      <line x1="225" y1="28" x2="225" y2="58"/>
      <line x1="275" y1="28" x2="275" y2="58"/>
      <line x1="325" y1="28" x2="325" y2="58"/>
      <line x1="375" y1="28" x2="375" y2="58"/>
      <line x1="425" y1="28" x2="425" y2="58"/>
      <line x1="475" y1="28" x2="475" y2="58"/>
      <line x1="525" y1="28" x2="525" y2="58"/>
      <line x1="575" y1="28" x2="575" y2="58"/>
      <line x1="625" y1="28" x2="625" y2="58"/>
      <line x1="675" y1="28" x2="675" y2="58"/>
      <line x1="725" y1="28" x2="725" y2="58"/>
      <line x1="775" y1="28" x2="775" y2="58"/>
      <line x1="825" y1="28" x2="825" y2="58"/>
      <line x1="875" y1="28" x2="875" y2="58"/>
      <line x1="925" y1="28" x2="925" y2="58"/>
      <line x1="975" y1="28" x2="975" y2="58"/>
      <line x1="1025" y1="28" x2="1025" y2="58"/>
      <line x1="1075" y1="28" x2="1075" y2="58"/>
      <line x1="1125" y1="28" x2="1125" y2="58"/>
      <line x1="1175" y1="28" x2="1175" y2="58"/>
      <line x1="1225" y1="28" x2="1225" y2="58"/>
      <line x1="1275" y1="28" x2="1275" y2="58"/>
      <line x1="1325" y1="28" x2="1325" y2="58"/>
      <line x1="1375" y1="28" x2="1375" y2="58"/>
      <line x1="1425" y1="28" x2="1425" y2="58"/>
      <line x1="1475" y1="28" x2="1475" y2="58"/>
      <line x1="1525" y1="28" x2="1525" y2="58"/>
      <line x1="1575" y1="28" x2="1575" y2="58"/>
      <line x1="1625" y1="28" x2="1625" y2="58"/>
      <line x1="1675" y1="28" x2="1675" y2="58"/>
      <line x1="1725" y1="28" x2="1725" y2="58"/>
      <line x1="1775" y1="28" x2="1775" y2="58"/>
      <line x1="1825" y1="28" x2="1825" y2="58"/>
      <line x1="1875" y1="28" x2="1875" y2="58"/>
      <line x1="1925" y1="28" x2="1925" y2="58"/>
      <line x1="1975" y1="28" x2="1975" y2="58"/>
    </g>
  </g>

  <!-- Brand hint (optional, small) -->
  <text x="1000" y="22" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#3d3020" text-anchor="middle" opacity="0.7">RFC 20 IN REF</text>
</svg>
